    <h3>&nbsp;Registro de eventos</h3>
    <br><br>
    <div class="container" style="max-width:800px; margin:auto;" >

        <form id="eventForm" >

            <div class="input-group">
                <h4>DATOS GESTOR DEL EVENTO  </h4>
                <label for="email">Email encargado:</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required><br>

                <label for="rut">RUT Institucion o persona:</label>
                <input type="text" id="rut" name="rut" placeholder="ingrese su rut 12.123.123-k" required><br>
        
                <label for="name">Nombre encargado:</label>
                <input type="text" id="name" name="name" placeholder="Ingrese su nombre" required><br>
                <input type="text" id="name" name="name" placeholder="Ingrese nombre de institucion si aplica"><br>
        
                <label for="eventName">Nombre del evento:</label>
                <input type="text" id="eventName" name="eventName" placeholder="Nombre del evento" required><br>
        
                <label for="eventDate">Fecha del evento:</label>
                <input type="date" id="eventDate" name="eventDate" required><br>
        
                <label for="eventTime">Hora del evento:</label>
                <input type="time" id="eventTime" name="eventTime" required><br>
        
                <label for="eventLocation">Lugar del evento:</label>
                <input type="text" id="eventLocation" name="eventLocation" placeholder="URL o Calle #1234, comuna y ciudad" required><br>
        
                <label for="discipline">Disciplina:</label>
                <select id="discipline" name="discipline" required>
                <option value="">Seleccione una disciplina</option>
                <option value="futbol">KUDO</option>
                <option value="basketball">Karate</option>
                <option value="natacion">TKD</option>
                <option value="atletismo">BJJ</option>
                </select><br>
        
                <label for="imageUpload">Cargar imagen del evento (PNG):</label>
                <input type="file" id="imageUpload" name="imageUpload" accept="image/png"><br>
        
                <div id="imagePreview"></div>
        
                <button type="submit">Enviar</button>
                <br><br>
                <p>Con esta informacion nuestro equipo se pondra en contacto contigo 
                  en maximo las proximas 48 horas para darte mas detalles, condiciones y costos del servicio.</p>
            </div>
            
        </form>
</div>
