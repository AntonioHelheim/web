<section id="contacto" class="section bg-soft">
  <div class="container">
    <h2 class="section-title">Inicie la Defensa de sus Derechos Hoy</h2>

    <form class="contact-form mt-5">
      <input type="text" class="form-control" placeholder="Nombre completo">
      <input type="tel" class="form-control" placeholder="Teléfono">
      <input type="email" class="form-control" placeholder="Correo electrónico">

      <select class="form-select">
        <option>Motivo de consulta</option>
        <option>Laboral</option>
        <option>Fraude</option>
        <option>Compliance</option>
        <option>Cibercrimen</option>
        <option>Familia</option>
      </select>

      <button class="btn btn-success mt-3">Enviar Consulta</button>
    </form>
  </div>
</section>
