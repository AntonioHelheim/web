<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Navbar Big Chomp</title>

    <!-- 👇 ESTA ES LA LÍNEA CLAVE PARA MOBILE/TABLET -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Fuente Chewy -->
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">

  <!-- Tu CSS (asegúrate que el archivo se llame main-02.css) -->
  <link rel="stylesheet" href="css/main-02.css">
</head>
<body>

<nav id="mainNav" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">

    <!-- Marca (logo imagen + texto Big Chomp) -->
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img class="brand-mark me-2" src="images/logo-bakery.svg" alt="Big Chomp logo">
      <span class="brand-name">Big Chomp</span>
    </a>

    <!-- Carrito (único, mantiene la conexión con el modal) -->
    <button type="button"
            class="btn nav-cart-btn ms-auto me-2 position-relative"
            aria-label="Carrito de compras">
      <i class="bi bi-bag fs-5"></i>
      <span id="cartCount"
            class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle d-none">
        0
      </span>
    </button>

   <!-- Redes sociales (solo desktop) -->
<ul class="navbar-nav nav-social d-none d-lg-flex flex-row align-items-center">
  <li class="nav-item">
    <a class="nav-link px-2" href="https://www.instagram.com/big_chomp_mascotas/" target="_blank" aria-label="Instagram">
      <i class="bi bi-instagram fs-5"></i>
    </a>
  </li>
  <li class="nav-item">
    <a class="nav-link px-2" href="https://wa.me/56958513034" target="_blank" aria-label="WhatsApp">
      <i class="bi bi-whatsapp fs-5"></i>
    </a>
  </li>
</ul>


    <!-- Toggler (solo mobile) -->
    <button class="navbar-toggler border-0 ms-2 d-lg-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Menú">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú colapsable -->
    <div class="collapse navbar-collapse mt-2 mt-lg-0" id="navbarMain">
      <!-- Menú principal (secciones) -->
      <ul class="navbar-nav main-menu mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="#productos">Tortas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#packs">Snacks</a>
        </li>
        <!-- <li class="nav-item">
          <a class="nav-link" href="#ingredientes">Ingredientes</a>
        </li> -->
        <li class="nav-item">
          <a class="nav-link" href="#contacto">Contacto</a>
        </li>
      </ul>

      <!-- Redes sociales dentro del menú (solo mobile/tablet) -->
<div class="nav-social-mobile d-lg-none pt-3 pb-2 text-center">
  <a class="social-icon me-3" href="https://www.instagram.com/big_chomp_mascotas/" target="_blank" aria-label="Instagram">
    <i class="bi bi-instagram fs-4"></i>
  </a>
  <a class="social-icon" href="https://wa.me/56958513034" target="_blank" aria-label="WhatsApp">
    <i class="bi bi-whatsapp fs-4"></i>
  </a>
</div>


    </div>
  

  </div>
</nav>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
