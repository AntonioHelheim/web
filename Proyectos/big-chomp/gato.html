<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Loader — Gato colgando (rasguños desde la pata)</title>
<style>
  :root{
    --duration: 3s;          /* duración total del loader */
    --cat: #111;             /* color del gato (silueta) */
    --scratch: #1a66bf;      /* color de los rasguños */
    --scratch-w: 3;          /* grosor de rasguños */
    --eye-blink: 4.8s;       /* ritmo del parpadeo */
    --tail-speed: 1.8s;      /* ritmo de la cola */
  }

  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:#f6f7f9;color:#111}
  main{min-height:100vh;display:grid;place-items:center;padding:4rem 1rem}

  /* ===== Overlay del loader ===== */
  .overlay{
    position:fixed; inset:0; background:#fff; z-index:9999; display:grid; place-items:center; overflow:hidden;
  }
  .panel{
    position:absolute; inset:0; background:#fff; display:grid; place-items:center;
    animation: drop var(--duration) cubic-bezier(.22,.72,.29,.99) forwards;
  }
  @keyframes drop{
    0%{ transform: translateY(0) }
    18%{ transform: translateY(2%) }   /* pequeño estirón inicial */
    28%{ transform: translateY(4%) }   /* tras micro-retorno de garras */
    100%{ transform: translateY(100%) }
  }

  .stage{ width:min(440px,92vw); aspect-ratio: 3/4; position:relative; display:grid; place-items:center }

  /* SVG principal */
  svg#catScene{ width: 82%; height:auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,.15)); }

  /* —— Animaciones específicas dentro del SVG —— */
  /* Cola */
  #tail{
    transform-box: fill-box;
    transform-origin: 20% 50%;
    animation: wag var(--tail-speed) ease-in-out infinite;
  }
  @keyframes wag{
    0%,100%{ transform: rotate(10deg) }
    50%    { transform: rotate(-6deg) }
  }

  /* Parpadeo (aplanamos Y de los ojos) */
  .eye{
    transform-box: fill-box; transform-origin: 50% 50%;
    animation: blink var(--eye-blink) ease-in-out infinite;
  }
  @keyframes blink{
    0%, 6%, 100%{ transform: scaleY(1) }
    3%         { transform: scaleY(0.07) }
    /* parpadeo doble ocasional */
    60%        { transform: scaleY(1) }
    62%        { transform: scaleY(0.07) }
    64%        { transform: scaleY(1) }
  }

  /* Rasguños (cada trazo se “dibuja” hacia abajo, nace en la pata) */
  .scratch{
    fill:none; stroke:var(--scratch); stroke-width:var(--scratch-w);
    stroke-linecap:round; stroke-linejoin:round;
    /* “oculto” al inicio: longitud virtual alta */
    stroke-dasharray: 260; stroke-dashoffset: 260;
  }
  /* izquierda: 4 garras desde la mano izquierda */
  #L1{ animation: scratchSeq var(--duration) linear    0s forwards }
  #L2{ animation: scratchSeq var(--duration) linear  .03s forwards }
  #L3{ animation: scratchSeq var(--duration) linear  .06s forwards }
  #L4{ animation: scratchSeq var(--duration) linear  .09s forwards }
  /* derecha: 4 garras desde la mano derecha */
  #R1{ animation: scratchSeq var(--duration) linear  .12s forwards }
  #R2{ animation: scratchSeq var(--duration) linear  .15s forwards }
  #R3{ animation: scratchSeq var(--duration) linear  .18s forwards }
  #R4{ animation: scratchSeq var(--duration) linear  .21s forwards }

  @keyframes scratchSeq{
    0%   { stroke-dashoffset: 260; opacity:0 }  /* contacto */
    10%  { opacity:1 }
    20%  { stroke-dashoffset: 170 }             /* golpe corto hacia abajo */
    28%  { stroke-dashoffset: 195 }             /* micro-retorno (sube un poco) */
    100% { stroke-dashoffset:   0 }             /* arrastre largo hasta el final */
  }

  .hint{ position:absolute; bottom:clamp(10px,3vw,20px); font-size:12px; color:#777 }

  @media (prefers-reduced-motion: reduce){
    .panel{ animation:none }
    #tail, .eye, .scratch{ animation:none }
  }
</style>
</head>
<body>

<!-- ===== LOADER ===== -->
<div class="overlay" aria-hidden="true">
  <div class="panel">
    <div class="stage">
      <!-- Un solo SVG: gato + rasguños que nacen desde las manos -->
      <svg id="catScene" viewBox="0 0 200 320" role="img" aria-label="Gato colgando y raguñando">

        <!-- ===== RASGUÑOS (paths bajo cada mano, nacen pegados a la palma) ===== -->
        <!-- Mano IZQUIERDA (coordenadas cerca de x≈61, y≈44) -->
        <g id="scratches-left">
          <!-- separaciones pequeñas en X para 4 uñas -->
          <path id="L1" class="scratch" d="M56 52 C 56 64, 58 74, 56 90 C 54 110, 58 130, 56 160 C 54 190, 58 210, 56 300" />
          <path id="L2" class="scratch" d="M60 52 C 60 66, 62 76, 60 92 C 58 112, 62 132, 60 162 C 58 192, 62 212, 60 300" />
          <path id="L3" class="scratch" d="M64 52 C 64 68, 66 78, 64 94 C 62 114, 66 134, 64 164 C 62 194, 66 214, 64 300" />
          <path id="L4" class="scratch" d="M68 52 C 68 70, 70 80, 68 96 C 66 116, 70 136, 68 166 C 66 196, 70 216, 68 300" />
        </g>

        <!-- Mano DERECHA (coordenadas cerca de x≈139, y≈44) -->
        <g id="scratches-right">
          <path id="R1" class="scratch" d="M132 52 C 132 64, 134 74, 132 90 C 130 110, 134 130, 132 160 C 130 190, 134 210, 132 300" />
          <path id="R2" class="scratch" d="M136 52 C 136 66, 138 76, 136 92 C 134 112, 138 132, 136 162 C 134 192, 138 212, 136 300" />
          <path id="R3" class="scratch" d="M140 52 C 140 68, 142 78, 140 94 C 138 114, 142 134, 140 164 C 138 194, 142 214, 140 300" />
          <path id="R4" class="scratch" d="M144 52 C 144 70, 146 80, 144 96 C 142 116, 146 136, 144 166 C 142 196, 146 216, 144 300" />
        </g>

        <!-- ===== SILUETA DEL GATO (más cercana al dibujo) ===== -->
        <!-- Brazos (estirados arriba) -->
        <g id="arms" fill="var(--cat)">
          <!-- antebrazos -->
          <rect x="52" y="44" width="18" height="92" rx="9" />
          <rect x="130" y="44" width="18" height="92" rx="9" />
          <!-- manos (palmas redondeadas) -->
          <ellipse cx="61"  cy="44" rx="12" ry="10" />
          <ellipse cx="139" cy="44" rx="12" ry="10" />
        </g>

        <!-- Uñas blancas (visuales) -->
        <g fill="#fff">
          <!-- izquierda -->
          <rect x="55" y="14" width="2.2" height="30" rx="1"/>
          <rect x="59" y="14" width="2.2" height="30" rx="1"/>
          <rect x="63" y="14" width="2.2" height="30" rx="1"/>
          <rect x="67" y="14" width="2.2" height="30" rx="1"/>
          <!-- derecha -->
          <rect x="133" y="14" width="2.2" height="30" rx="1"/>
          <rect x="137" y="14" width="2.2" height="30" rx="1"/>
          <rect x="141" y="14" width="2.2" height="30" rx="1"/>
          <rect x="145" y="14" width="2.2" height="30" rx="1"/>
        </g>

        <!-- Cabeza (ovalada) + orejas triangulares -->
        <g id="head" fill="var(--cat)">
          <ellipse cx="100" cy="110" rx="40" ry="34" />
          <polygon points="76,96 86,68 94,98" />
          <polygon points="106,98 114,68 124,96" />
        </g>

        <!-- Ojos grandes (parpadeo) -->
        <g id="eyes">
          <ellipse class="eye" cx="88" cy="112" rx="12" ry="10" fill="#fff"/>
          <ellipse class="eye" cx="112" cy="112" rx="12" ry="10" fill="#fff"/>
          <circle cx="90" cy="114" r="4" fill="#111"/>
          <circle cx="110" cy="114" r="4" fill="#111"/>
        </g>

        <!-- Nariz y bigotes -->
        <circle cx="100" cy="124" r="3" fill="#ff8a80"/>
        <g stroke="#333" stroke-width="2" stroke-linecap="round">
          <line x1="84" y1="124" x2="72" y2="120"/>
          <line x1="84" y1="128" x2="70" y2="130"/>
          <line x1="116" y1="124" x2="128" y2="120"/>
          <line x1="116" y1="128" x2="130" y2="130"/>
        </g>

        <!-- Cuerpo alargado -->
        <ellipse cx="100" cy="200" rx="50" ry="86" fill="var(--cat)" />

        <!-- Patas traseras con almohadillas -->
        <g id="hind" fill="var(--cat)">
          <ellipse cx="78"  cy="274" rx="16" ry="26"/>
          <ellipse cx="122" cy="274" rx="16" ry="26"/>
        </g>
        <g fill="#fff">
          <circle cx="78"  cy="286" r="6"/>
          <circle cx="122" cy="286" r="6"/>
        </g>

        <!-- Cola (curva y animada) -->
        <path id="tail" d="M112 256 q 30 20 10 44 q -10 14 4 26"
              fill="none" stroke="var(--cat)" stroke-width="16" stroke-linecap="round" />


      </svg>

      <div class="hint">Cargando…</div>
    </div>
  </div>
</div>

<!-- ===== CONTENIDO REAL ===== -->
<main>
  <div style="max-width:780px;text-align:center">
    <h1>Tu página</h1>
    <p>El overlay se va en 3 segundos, el gato parpadea y la cola se mueve. Los rasguños parten desde cada pata.</p>
  </div>
</main>

<script>
/* Retira el overlay cuando termina la animación (~3s) */
(function(){
  var overlay = document.querySelector('.overlay');
  var ms = 3000;
  setTimeout(function(){ overlay && overlay.remove(); }, ms + 60);
})();
</script>
</body>
</html>
