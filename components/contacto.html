<!--==================== CONTACTO ====================-->
<section id="formcontacto" class="container my-4">
  <div class="contact-box rounded p-4 p-md-5">
    <div class="row align-items-center justify-content-center g-4 g-lg-5">
      
      <!-- Logo + mensaje (izquierda en desktop, arriba en mobile) -->
      <div class="col-12 col-lg-5">
        <div class="contact-logo text-center text-lg-start">
          <img src="./images/logo/Logo_Helheim-BB.png"
               class="img-fluid"
               alt="Helheim Tierra del Fuego — Logo"
               loading="lazy">
          <p class="text-white mt-3 mb-0">
            ¿Tienes dudas o quieres cotizar algún servicio?
            <strong>Contáctanos</strong> y te responderemos a la brevedad.
          </p>
        </div>
      </div>

      <!-- Formulario (derecha en desktop, abajo en mobile) -->
      <div class="col-12 col-lg-6">
        <h4 class="mb-3 text-center text-white">Formulario de contacto</h4>
        <form action="https://formspree.io/f/mjkyvwgq" method="POST" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label text-white">Tu nombre:</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Tu nombre" required>
            <div class="invalid-feedback text-white bg-danger bg-opacity-25 rounded px-2">
              Por favor ingresa tu nombre.
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label text-white">Tu correo electrónico:</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="nombre@correo.com" required>
            <div class="invalid-feedback text-white bg-danger bg-opacity-25 rounded px-2">
              Por favor ingresa un correo válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label text-white">Tu mensaje:</label>
            <textarea class="form-control" id="message" name="message" rows="5" placeholder="Cuéntanos sobre tu proyecto..." required></textarea>
            <div class="invalid-feedback text-white bg-danger bg-opacity-25 rounded px-2">
              Por favor escribe tu mensaje.
            </div>
          </div>

          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <button type="submit" class="btn btn-outline-light">Enviar</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>
